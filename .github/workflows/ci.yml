name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  miniapp:
    name: Mini App Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck miniapp
        run: pnpm --filter miniapp exec tsc --noEmit

      - name: Build miniapp
        run: pnpm --filter miniapp build
