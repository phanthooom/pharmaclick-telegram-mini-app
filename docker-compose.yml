version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: pharmaclick_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pharmaclick
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pharmaclick_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: pharmaclick_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pharmaclick_postgres_data:
